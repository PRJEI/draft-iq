<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Draft IQ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>🏈 Draft IQ</h1>
    <p>Load Players' Information</p>

    <button id="loadBtn">Load Players</button>

    <table id="playerTable" hidden>
      <thead>
        <tr>
          <th>Name</th>
          <th>Position</th>
          <th>Team</th>
          <th>Height</th>
          <th>Years Pro</th>
        </tr>
      </thead>
      <tbody id="playerList"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
