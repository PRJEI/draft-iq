<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Draft IQ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>🏈 Draft IQ</h1>
    <p>Use commands to find information on NFL Teams and Players(type commands like <code>help</code>, <code>teams afc</code>, <code>players qb</code>)</p>

    <div class="ask-row">
      <input id="commandInput" type="text" placeholder="Type a command (ex: help, top 10 players, roster chiefs)" />
      <button id="askBtn">Ask Bot</button>
    </div>

    <div id="botResponse" class="bot-response"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
